<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">

  <title>AnhTuan Developer</title>
  <!-- css -->
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link type="text/css" rel="stylesheet" href="assets/css/app.css">
  <link style="text/css" rel="stylesheet" href="assets/css/thd.css">

  <!-- css -->
  <script type="text/javascript" src="assets/js/app.js"></script>

</head>

<body>

<div class="app">
  <div class="w-full min-h-screen">

    <!-- top header -->
    <header class="mb-4">
      <section 
        class="panner w-full h-160 relative">
        <div 
          class="absolute top-0 right-0 w-128 h-128 mr-24 mt-20 opacity-25 object-cover">
          <img
            class="w-full h-full"
            src="assets/images/panner/top-panner-bg-left.svg" alt="">
        </div>
        <div class="absolute inset-y-auto inset-x-0 w-full">
          <div class="w-full flex justify-between py-4 pxx-6 lg:px-12">

            <div class="brand w-1/2 lg:w-1/4 flex justify-start items-center
              text-themeOnPrimary uppercase font-bold text-lg"
              >
              <div class="avatar w-10 h-10 object-cover mr-3">
                <img class="w-full h-full rounded-full" src="assets/images/avatar.svg" />
              </div>
              <p class="title-transform cursor-default">AnhTuan Dev</p>
            </div>
            
            <nav class="w-full space-x-3 flex justify-end">
              <a href="/" 
                class="btn flex px-4 py-1 items-center rounded-full text-lg
                font-medium text-themeOnPrimary hover:bg-themeHoverSecondary"
                ><img class="w-4 h-4 mr-1" src="assets/icons/dark/home.svg">Home
              </a>
              <a href="/pages/about"
                class="btn flex px-4 py-1 items-center rounded-full text-lg font-medium 
                text-themeOnPrimary hover:bg-themeHoverSecondary"
                ><img class="w-4 h-4 mr-1" src="assets/icons/dark/briefcase.svg">About
              </a>
            </nav>

          </div>
        </div>
      </section>
    </header>
    <!-- end top header -->

    <section class="px-16 lg:px-48">

      <div x-data="social()"
        class="space-x-8 flex justify-center mb-8">
        <template x-for="item in brands">
          <div x-text="item.key"
            class="w-30 h-30 bg-purple-500 px-4 py-2 rounded-full
            shadow-md flex items-center justify-center btn">
          </div>
        </template>
      </div>

    </section>

    <section class="px-16 lg:px-48">
      <!-- header module 1 -->
      <div 
        x-data="headerModuleData()"
        class="mb-8  px-30w-full flex flex-wrap text-themeText text-lg text-center">
          <h2
            x-text="headerModuleOne.title"
            class="w-full text-center text-3xl font-bold mb-3"
            >
          </h2>
          <p
            x-text="headerModuleOne.description"
            class="w-full text-center">
          </p>
      </div>

      <!-- module.card 1 -->
      <div x-data="cardsData()" 
        class="grid grid-cols-4 gap-4 mb-8 text-center"
        >
        <template x-for="(card, index) in cards" :key="index"
          class="space-y-4 justify-center"
          >
          <div x-text="card.key"
            :class="card.class"
            class="card span-col-1 h-56 bg-indigo-300 p-6 rounded-lg 
            shadow-lg flex items-center justify-center"
            ></div>
        </template>
      </div>

    </section>

    <section class="px-16 lg:px-48">
      <!-- header module 2 -->
      <div 
        x-data="headerModuleData()"
        class="mb-8  px-30w-full flex flex-wrap text-themeText text-lg text-center">
          <h2
            x-text="headerModuleTwo.title"
            class="w-full text-center text-3xl font-bold mb-3"
            >
          </h2>
          <p
            x-text="headerModuleOne.description"
            class="w-full text-center">
          </p>
      </div>
      <!-- module.card 50100 -->
      <div x-data="cardsData50100()" 
        class="grid grid-cols-2 gap-4 mb-8 text-center"
        >
        <template x-for="(card, index) in cards" :key="index"
          class="space-y-4 justify-center"
          >
          <div x-text="card.key"
            :class="card.class"
            class="card50100 span-col-1 h-56 bg-indigo-300 p-6 rounded-lg 
            shadow-lg flex items-center justify-center"
            ></div>
        </template>
      </div>

    </section>

    <!-- footer -->
    <section class="w-full">
      <div class="grid grid-cols-2 gap-4 bg-themePrimary">
        <div class="span-col-1 h-32">Left</div>
        <div class="span-col-1 h-32">Right</div>
      </div>
    </section>

  </div>
</div>

<!-- script -->
<script type="text/javascript" src="assets/js/thd.js"></script>

</body>
</html>
