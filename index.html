<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <title>AnhTuan Developer</title>
  <!-- css -->
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link type="text/css" rel="stylesheet" href="assets/css/app.css">
  <link style="text/css" rel="stylesheet" href="assets/css/thd.css">
  <!-- css -->
  <script type="text/javascript" src="assets/js/app.js"></script>
</head>
<body>

<div class="app">
  <div class="w-full min-h-screen leading-normal">

    <!-- top header -->
    <header x-data="topHeaderData()" class="mb-4">
      <section x-html="topHeader"
        class="panner w-full h-160 relative px-6 lg:px-48">
      </section>
    </header>
    <!-- end top header -->

    <section class="px-16 lg:px-64 mb-6 lg:mb-24">
      <div x-data="social()"
        class="space-x-8 flex justify-center cursor-default">

        <template x-for="item in brands">
          <div x-html="item.key"
            class="w-12 h-12 bg-themeSecondary p-2 rounded-full
            shadow-md flex items-center justify-center brand-logo">
          </div>
        </template>

      </div>
    </section>

    <section class="px-16 lg:px-64 mb-6 lg:mb-24">
      <!-- header module 1 -->
      <div x-data="headerModuleData()"
        class="mb-8 px-30 w-full flex flex-wrap text-themeText text-lg text-center"
        >
        <h2 x-text="headerModuleOne.title"
          class="w-full text-center text-3xl uppercase font-bold mb-2"
          >
        </h2>
        <p x-html="headerModuleOne.description"
          class="w-full text-center mb-6"
          >
        </p>
      </div>

      <!-- module.card 1 -->
      <div x-data="cardsData()" 
        class="grid grid-cols-3 gap-8 text-center"
        >
        <template x-for="(card, index) in cards" :key="index"
          class="space-y-4 justify-center"
          >
          <div x-text="card.key"
            :class="card.class"
            class="card span-col-1 h-56 bg-indigo-300 p-6 rounded-lg 
            shadow-lg flex items-center justify-center"
            >
          </div>
        </template>
      </div>

    </section>

    <section class="px-16 lg:px-64 mb-6 lg:mb-48">
      <!-- header module 2 -->
      <div x-data="headerModuleData()"
        class="lg:mb-8 px-30 w-full flex flex-wrap text-themeText text-lg text-center">
          <h2 x-text="headerModuleTwo.title"
            class="w-full text-center text-3xl font-bold mb-2 uppercase"
            >
          </h2>
          <p x-html="headerModuleTwo.description"
            class="w-full text-center break-words mb-6">
          </p>
      </div>
      <!-- module.card 50100 -->
      <div x-data="cardsData50100()" 
        class="grid grid-cols-2 gap-8 text-center"
        >
        <template x-for="(card, index) in cards" :key="index"
          class="space-y-4 justify-center"
          >
          <div x-text="card.key"
            :class="card.class"
            class="card50100 span-col-1 h-48 bg-indigo-300 p-6 rounded-lg 
            shadow-lg flex items-center justify-center"
            >
          </div>
        </template>
      </div>

    </section>

    <!-- footer -->
    <section class="w-full">
      <div class="footer grid grid-cols-2 gap-4 py-8">
        <div class="span-col-1 h-48">Left</div>
        <div class="span-col-1 h-48">Right</div>
      </div>
    </section>

  </div>
</div>

<!-- script -->
<script type="text/javascript" src="assets/js/thd.js"></script>

</body>
</html>
